joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

arm_position_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - joint_1
    - joint_2
    - joint_3
    - joint_4
    - joint_5
    - joint_6
  gains:
    joint_1: { p: 100.0, i: 0.01, d: 10.0 }
    joint_2: { p: 100.0, i: 0.01, d: 10.0 }
    joint_3: { p: 100.0, i: 0.01, d: 10.0 }
    joint_4: { p: 100.0, i: 0.01, d: 10.0 }
    joint_5: { p: 100.0, i: 0.01, d: 10.0 }
    joint_6: { p: 100.0, i: 0.01, d: 10.0 }
  constraints:
    goal_time: 1.0
    stopped_velocity_tolerance: 0.01
    joint_1: { trajectory: 0.1, goal: 0.05 }
    joint_2: { trajectory: 0.1, goal: 0.05 }
    joint_3: { trajectory: 0.1, goal: 0.05 }
    joint_4: { trajectory: 0.1, goal: 0.05 }
    joint_5: { trajectory: 0.1, goal: 0.05 }
    joint_6: { trajectory: 0.1, goal: 0.05 }
  stop_trajectory_duration: 0.5
  state_publish_rate: 50
  action_monitor_rate: 20
